# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    # Note that the session will be started ONLY if you read or write from it.
    session:
        handler_id: 'Symfony\Component\HttpFoundation\Session\Storage\Handler\PdoSessionHandler'
        cookie_lifetime: 2592000  # cookie lives 30 days in browser
        gc_maxlifetime: 2592000   # server keeps session data for 30 days
        cookie_secure: auto       # HTTPS only in prod, HTTP allowed in dev
        cookie_samesite: lax

    rate_limiter:
        # Webhook: 600 deliveries/minute per IP — protects against replay floods
        github_webhook:
            policy: fixed_window
            limit: 600
            interval: '1 minute'
        # API: 120 requests/minute per authenticated user
        api_user:
            policy: sliding_window
            limit: 120
            interval: '1 minute'

    #esi: true
    #fragments: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
