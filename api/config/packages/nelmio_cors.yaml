nelmio_cors:
    defaults:
        origin_regex: false
        allow_origin: ['%env(FRONT_URL)%']
        allow_credentials: true
        allow_methods: ['GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE']
        allow_headers: ['Content-Type', 'Authorization', 'X-Requested-With', 'Accept', 'Origin']
        expose_headers: ['Link']
        max_age: 3600
    paths:
        '^/': null
