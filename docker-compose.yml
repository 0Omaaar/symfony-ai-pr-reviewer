services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    environment: &api_env
      APP_ENV: dev
      DATABASE_URL: "postgresql://app:!ChangeMe!@database:5432/app?serverVersion=16&charset=utf8"
      MAILER_DSN: "smtp://elkhotriomarpro%40gmail.com:kckfozwgpcnlzxlv@smtp.gmail.com:587?encryption=tls&auth_mode=login"
      GITHUB_APP_ID: "2860467"
      GITHUB_APP_INSTALL_URL: "https://github.com/apps/symfony-ai-pr-reviewer-bot/installations/new"
      GITHUB_WEBHOOK_SECRET: "symfony-ai-pr-reviewer-bot-12345"
      GITHUB_PRIVATE_KEY_PATH: "/app/var/github-app.pem"
      GITHUB_OAUTH_CLIENT_ID: "Ov23liDLvehNpHVw89EG"
      GITHUB_OAUTH_CLIENT_SECRET: "4d952dd729ee0d6352596b372b77c8849d8f1cc6"
      FRONT_URL: "http://localhost:5173"
      PR_ALERT_FROM_EMAIL: "noreply@autopgmr.local"
      PR_ALERT_FROM_NAME: "autoPMR"
      PR_ALERT_REPLY_TO: ""
      PR_ALERT_FRONT_URL: "http://localhost:5173"
      ADMIN_EMAIL: "admin@admin.com"
      ADMIN_PASSWORD: "adminadmin"
      ADMIN_SECRET: "change-me-in-production-use-a-long-random-string"
      N8N_INTERNAL_TOKEN: "changeme-internal-token"
    volumes:
      - ./api:/app
      - api_vendor:/app/vendor
      - ./api/secrets/symfony-ai-pr-reviewer-bot.2026-02-13.private-key.pem:/app/var/github-app.pem:ro
    depends_on:
      database:
        condition: service_healthy
      mailer:
        condition: service_started

  messenger_worker:
    build: ./api
    command: ["php", "bin/console", "messenger:consume", "async", "--time-limit=3600"]
    environment: *api_env
    volumes:
      - ./api:/app
      - api_vendor:/app/vendor
      - ./api/secrets/symfony-ai-pr-reviewer-bot.2026-02-13.private-key.pem:/app/var/github-app.pem:ro
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      mailer:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: "http://localhost:8000"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "100"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: "!ChangeMe!"
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "app", "-U", "app"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/postgresql/data:rw

  mailer:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  pgadmin:
    image: dpage/pgadmin4
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - database

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: "admin@admin.com"
      N8N_BASIC_AUTH_PASSWORD: adminadmin
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: "https://5729-105-190-151-180.ngrok-free.app/"
      GENERIC_TIMEZONE: UTC
      N8N_INTERNAL_TOKEN: "changeme-internal-token"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - api

  csfixer:
    image: cytopia/php-cs-fixer:latest
    working_dir: /workdir
    volumes:
      - ./:/workdir

volumes:
  database_data:
  api_vendor:
  n8n_data:
